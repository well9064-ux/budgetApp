name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests with 100 percent coverage
        run: pytest --cov=budget --cov-branch --cov-fail-under=100

      - name: Check cyclomatic complexity
        run: xenon --max-absolute B --max-modules B --max-average B budget

      - name: Run style checks
        run: flake8 budget tests
